<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home Services App</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#f5f7fa;
}

.login-container{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.card{
background:white;
width:420px;
padding:30px;
border-radius:15px;
box-shadow:0 4px 20px rgba(0,0,0,.1);
}

.card h2{
text-align:center;
margin-bottom:20px;
color:#2563eb;
}

.tabs{
display:flex;
margin-bottom:20px;
}

.tabs button{
flex:1;
padding:12px;
border:none;
cursor:pointer;
}

.active-tab{
background:#2563eb;
color:white;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border:1px solid #ddd;
border-radius:8px;
}

.submit-btn{
width:100%;
padding:12px;
margin-top:15px;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

.message{
margin-top:15px;
text-align:center;
font-weight:bold;
}

.form{
display:none;
}

.form.active{
display:block;
}

.dashboard{
display:none;
}

nav{
background:#2563eb;
color:white;
padding:15px 30px;
display:flex;
justify-content:space-between;
align-items:center;
}

nav ul{
display:flex;
gap:20px;
list-style:none;
}

nav li{
cursor:pointer;
}

.container{
padding:30px;
}

.section{
display:none;
}

.section.active{
display:block;
}

.card-box{
background:white;
padding:20px;
margin-top:20px;
border-radius:12px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.about{
display:flex;
gap:30px;
align-items:center;
}

.about img{
width:350px;
border-radius:15px;
}

.service-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:20px;
margin-top:20px;
}

.service-card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.logout-btn{
background:red;
color:white;
border:none;
padding:10px 15px;
border-radius:8px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="login-container" id="authPage">

<div class="card">

<h2>Express Home Services</h2>

<div class="tabs">
<button class="active-tab" id="signupTab" onclick="showTab('signup')">Signup</button>
<button id="loginTab" onclick="showTab('login')">Login</button>
</div>

<div id="signup" class="form active">

<input id="signupName" placeholder="Name">

<input id="signupEmail" placeholder="Email">

<input id="signupPassword" type="password" placeholder="Password">

<button class="submit-btn" onclick="signup()">
Register
</button>

</div>

<div id="login" class="form">

<input id="loginEmail" placeholder="Email">

<input id="loginPassword" type="password" placeholder="Password">

<button class="submit-btn" onclick="login()">
Login
</button>

</div>

<div class="message" id="msg"></div>

</div>

</div>

<div class="dashboard" id="dashboard"></div>

<script>

const API =
"http://localhost:5000/api/auth";

const services = [

{
category:"Cleaning",
name:"House Cleaning",
price:"₹499"
},

{
category:"Plumbing",
name:"Pipe Repair",
price:"₹799"
},

{
category:"Electrical",
name:"Fan Installation",
price:"₹599"
},

{
category:"Appliance",
name:"AC Service",
price:"₹999"
}

];

function showTab(tab){

document
.querySelectorAll(".form")
.forEach(form=>{
form.classList.remove("active");
});

document
.getElementById(tab)
.classList.add("active");

document
.getElementById("signupTab")
.classList.remove("active-tab");

document
.getElementById("loginTab")
.classList.remove("active-tab");

if(tab==="signup"){
document
.getElementById("signupTab")
.classList.add("active-tab");
}else{
document
.getElementById("loginTab")
.classList.add("active-tab");
}

}

async function signup(){

const name =
document.getElementById(
"signupName"
).value;

const email =
document.getElementById(
"signupEmail"
).value;

const password =
document.getElementById(
"signupPassword"
).value;

const response =
await fetch(
`${API}/signup`,
{
method:"POST",
headers:{
"Content-Type":
"application/json"
},
body:JSON.stringify({
name,
email,
password
})
}
);

const data =
await response.json();

document
.getElementById("msg")
.innerHTML =
data.message;

}

async function login(){

const email =
document.getElementById(
"loginEmail"
).value;

const password =
document.getElementById(
"loginPassword"
).value;

const response =
await fetch(
`${API}/login`,
{
method:"POST",
headers:{
"Content-Type":
"application/json"
},
body:JSON.stringify({
email,
password
})
}
);

const data =
await response.json();

if(data.token){

showDashboard(
data.user || {
name:"User",
email:email
}
);

}else{

document
.getElementById("msg")
.innerHTML =
"Invalid Credentials";

}

}

function showDashboard(user){

document
.getElementById("authPage")
.style.display="none";

document
.getElementById("dashboard")
.style.display="block";

document
.getElementById("dashboard")
.innerHTML = `

<nav>

<h2>Home Services</h2>

<ul>

<li onclick="openSection('home')">Home</li>

<li onclick="openSection('about')">About</li>

<li onclick="openSection('services')">Services</li>

<li onclick="openSection('profile')">Profile</li>

<li>
<button class="logout-btn"
onclick="logout()">
Logout
</button>
</li>

</ul>

</nav>

<div class="container">

<div id="home" class="section active">

<h1>Welcome ${user.name}</h1>

<div class="card-box">

<h3>Professional Home Services</h3>

<p>
Book trusted home services
at affordable prices.
</p>

</div>

</div>

<div id="about" class="section">

<h1>About Us</h1>

<div class="card-box about">

<img src="https://images.unsplash.com/photo-1581578731548-c64695cc6952">

<div>

<h2>Trusted Home Services</h2>

<p>

We provide reliable cleaning,
plumbing, electrical and
appliance repair services.

</p>

</div>

</div>

</div>

<div id="services" class="section">

<h1>Services</h1>

<div class="service-grid">

${services.map(service => `

<div class="service-card">

<h3>${service.name}</h3>

<p>${service.category}</p>

<h2>${service.price}</h2>

</div>

`).join("")}

</div>

</div>

<div id="profile" class="section">

<h1>Profile</h1>

<div class="card-box">

<h3>Name</h3>
<p>${user.name}</p>

<br>

<h3>Email</h3>
<p>${user.email}</p>

</div>

</div>

</div>

`;

}

function openSection(id){

document
.querySelectorAll(".section")
.forEach(section=>{
section.classList.remove(
"active"
);
});

document
.getElementById(id)
.classList.add("active");

}

function logout(){

location.reload();

}

</script>

</body>
</html>
